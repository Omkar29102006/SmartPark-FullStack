<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - SmartPark India</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="user-dashboard.css">
    <style>
        .timer-box {
            background: rgba(88,166,255,0.1); 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            border: 1px solid rgba(88,166,255,0.3);
            text-align: center;
        }
        .timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: #58a6ff;
            display: block;
        }
        .map-container {
            height: 180px; width: 100%; margin: 15px 0; 
            border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); background: #161b22;
        }
    </style>
</head>

<body>
    <header class="dashboard-header">
        <div class="header-left">
            <i class="fas fa-parking"></i>
            <span>SmartPark Dashboard</span>
        </div>
        <div class="header-right">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Verifying Session...</span>
            </div>
            <button onclick="scrollToBookings()" class="bookings-btn">
                <i class="fas fa-receipt"></i> My Bookings
            </button>
            <button onclick="toggleBookingsView()" id="viewToggle" class="completed-btn">
                <i class="fas fa-history"></i> View Completed
            </button>
            <button onclick="handleLogout()" style="background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; margin-left: 10px;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <section class="search-section">
        <h2>Find Parking Nearby</h2>
        <p class="network-chip"><i class="fas fa-layer-group"></i> Mumbai Network slots are managed live by admin controls</p>
        <div class="search-input-group">
            <input type="text" id="citySearch" placeholder="Search cities or areas..." onkeyup="handleSearchKey(event)">
            <button class="search-btn" onclick="filterCities()"><i class="fas fa-search"></i></button>
        </div>
        <div class="nearby-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button class="nearby-btn" onclick="findNearestParking()" style="padding: 10px 20px; border-radius: 8px; cursor: pointer; background: #238636; color: white; border: none;">
                <i class="fas fa-location-crosshairs"></i> Find Nearest Parking
            </button>
            <button class="nearby-btn" onclick="resetNearestView()" style="padding: 10px 20px; border-radius: 8px; cursor: pointer; background: #30363d; color: white; border: none;">
                <i class="fas fa-list"></i> Show All
            </button>
        </div>
        <div id="nearbyStatus" class="nearby-status" style="text-align: center; margin-top: 10px; color: #8b949e;"></div>
    </section>

    <section class="cities-section">
        <div class="cities-grid" id="citiesGrid"></div>
    </section>

    <section class="bookings-section">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="bookings-header">
                <h2 id="bookingsTitle" style="font-size: clamp(1.8rem, 6vw, 2.5rem); background: linear-gradient(135deg, #58a6ff, #79c0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    My Active Bookings
                </h2>
                <div id="userLastUpdated" class="last-updated">Connecting...</div>
            </div>
        </div>
        <div class="bookings-grid" id="bookingsGrid"></div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDigmGHwWyihxCZJP7KU5CijptuqwAtZqs",
            authDomain: "smartpark-india-54312.firebaseapp.com",
            projectId: "smartpark-india-54312",
            storageBucket: "smartpark-india-54312.firebasestorage.app",
            messagingSenderId: "58298050108",
            appId: "1:58298050108:web:2775b30f48c8ce7dad0539",
            measurementId: "G-PPH03PQE1D"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const MAP_URLS = {
            'delhi-cp': 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14008.11482718888!2d77.2165!3d28.6315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd350c330f61%3A0x6e78843e982d5a3c!2sConnaught%20Place%2C%20New%20Delhi!5e0!3m2!1sen!2sin!4v17000000000005',
            'bangalore-koramangala': 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14008.11482718888!2d77.2165!3d28.6315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd350c330f61%3A0x6e78843e982d5a3c!2sConnaught%20Place%2C%20New%20Delhi!5e0!3m2!1sen!2sin!4v17000000000006',
            'pune-hinjewadi': 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14008.11482718888!2d77.2165!3d28.6315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd350c330f61%3A0x6e78843e982d5a3c!2sConnaught%20Place%2C%20New%20Delhi!5e0!3m2!1sen!2sin!4v17000000000007',
            'mumbai-juhu': 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14008.11482718888!2d77.2165!3d28.6315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd350c330f61%3A0x6e78843e982d5a3c!2sConnaught%20Place%2C%20New%20Delhi!5e0!3m2!1sen!2sin!4v17000000000008',
            'mumbai-bkc': 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14008.11482718888!2d77.2165!3d28.6315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd350c330f61%3A0x6e78843e982d5a3c!2sConnaught%20Place%2C%20New%20Delhi!5e0!3m2!1sen!2sin!4v17000000000009',
            'mumbai-andheri': 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15082.934810793!2d72.8263!3d19.1075!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c99555555555%3A0x8888888888888888!2sJuhu%20Beach!5e0!3m2!1sen!2sin!4v17000000000000'
        };

        const cities = [
            { name: 'Mumbai', key: 'mumbai', iconClass: 'fas fa-city' },
            { name: 'Delhi CP', key: 'delhi-cp', iconClass: 'fas fa-building-columns' },
            { name: 'Bangalore MG', key: 'bangalore-koramangala', iconClass: 'fas fa-city' },
            { name: 'Pune Hinjewadi', key: 'pune-hinjewadi', iconClass: 'fas fa-building' }
        ];

        const mumbaiSpots = [
            { name: 'Juhu', key: 'mumbai-juhu', cityLabel: 'Mumbai Juhu' },
            { name: 'BKC', key: 'mumbai-bkc', cityLabel: 'Mumbai BKC' },
            { name: 'Andheri', key: 'mumbai-andheri', cityLabel: 'Mumbai Andheri' }
        ];

        let showCompleted = false;
        let currentUserId = null;
        let currentParkingView = 'cities'; 
        let globalTimerInterval = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userDoc = await db.collection("users").doc(user.uid).get();
                document.getElementById('userName').textContent = userDoc.exists ? (userDoc.data().name || userDoc.data().fullName) : "User";
                initRealTimeSync();
                listenToMyBookings();
            } else {
                window.location.href = "user-login.html";
            }
        });

        function initRealTimeSync() {
            db.collection("parking_spots").onSnapshot((snapshot) => {
                const liveData = {};
                snapshot.forEach(doc => liveData[doc.id] = doc.data());
                currentParkingView === 'cities' ? renderCityCards(liveData) : renderMumbaiSpots(liveData);
                updateLastUpdated();
            });
        }

        function renderCityCards(parkingSpots) {
            const grid = document.getElementById('citiesGrid');
            grid.innerHTML = '';
            cities.forEach((city) => {
                let spots = parkingSpots[city.key] || { total: 100, occupied: 0 };
                if (city.key === 'mumbai') {
                    spots = mumbaiSpots.reduce((acc, spot) => {
                        const sData = parkingSpots[spot.key] || { total: 100, occupied: 0 };
                        acc.total += sData.total; acc.occupied += sData.occupied;
                        return acc;
                    }, { total: 0, occupied: 0 });
                }
                const available = Math.max(0, spots.total - spots.occupied);
                const card = document.createElement('div');
                card.className = 'city-card-dashboard';
                card.innerHTML = `
                    <div class="city-icon-lg"><i class="${city.iconClass}"></i></div>
                    <div class="city-name-lg">${city.name}</div>
                    <div class="availability"><span class="free-spots">${available}</span> / ${spots.total} spots</div>
                    <div class="map-container">
                        ${city.key === 'mumbai' 
                            ? `<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#58a6ff;">Select Zone to view Map</div>`
                            : `<iframe src="${MAP_URLS[city.key]}" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>`
                        }
                    </div>
                    ${city.key === 'mumbai' 
                        ? `<button class="book-btn" onclick="openMumbaiSpots()">View Mumbai Zones</button>`
                        : `<button class="book-btn" onclick="bookSpot(event, '${city.key}', '${city.name}', 100)">Book Now - ₹100</button>`
                    }
                `;
                grid.appendChild(card);
            });
        }

        function renderMumbaiSpots(parkingSpots) {
            const grid = document.getElementById('citiesGrid');
            grid.innerHTML = `<button onclick="resetNearestView()" style="grid-column: 1/-1; background:none; border:none; color:#58a6ff; cursor:pointer; margin-bottom:15px; text-align:left;"><i class="fas fa-arrow-left"></i> Back to Cities</button>`;
            mumbaiSpots.forEach((spot) => {
                const data = parkingSpots[spot.key] || { total: 100, occupied: 0 };
                const available = Math.max(0, data.total - data.occupied);
                const card = document.createElement('div');
                card.className = 'city-card-dashboard';
                card.innerHTML = `
                    <div class="city-icon-lg"><i class="fas fa-square-parking"></i></div>
                    <div class="city-name-lg">${spot.cityLabel}</div>
                    <div class="availability"><span class="free-spots">${available}</span> / ${data.total} spots</div>
                    <div class="map-container"><iframe src="${MAP_URLS[spot.key]}" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe></div>
                    <button class="book-btn" onclick="bookSpot(event, '${spot.key}', '${spot.cityLabel}', 100)">Book Now - ₹100</button>
                `;
                grid.appendChild(card);
            });
        }

        function findNearestParking() {
            const status = document.getElementById('nearbyStatus');
            status.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Locating you...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(() => {
                    status.innerHTML = "<i class='fas fa-check-circle'></i> Closest spot found: Mumbai Juhu (2.4km)";
                    openMumbaiSpots(); 
                }, () => { status.innerHTML = "Location access denied."; });
            }
        }

        function listenToMyBookings() {
            db.collection("bookings").where("userUID", "==", currentUserId).onSnapshot((snapshot) => {
                const container = document.getElementById('bookingsGrid');
                let html = '';
                const bookings = [];
                snapshot.forEach(doc => bookings.push({id: doc.id, ...doc.data()}));
                const filtered = bookings.filter(b => (b.status === 'COMPLETED') === showCompleted);
                
                if (filtered.length === 0) {
                    container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#8b949e;">No ${showCompleted ? 'completed' : 'active'} bookings.</div>`;
                    return;
                }
                
                filtered.forEach(b => {
                    const isLive = !showCompleted && b.expiryTime;
                    html += `
                        <div class="booking-card ${showCompleted ? 'completed' : ''}">
                            <div class="status-circle ${showCompleted ? 'status-completed' : 'status-active'}">${showCompleted ? 'Done' : 'Live'}</div>
                            <div class="booking-header">
                                <i class="fas fa-parking"></i>
                                <div>${b.locationName} - <b>Spot ${b.spotNumber || 'A1'}</b></div>
                            </div>
                            <div class="detail-item"><span class="detail-label">Paid</span><span class="detail-value">₹${b.price}</span></div>
                            ${isLive ? `<div class="timer-box"><span class="timer-display" data-expiry="${b.expiryTime}" data-id="${b.id}" data-loc="${b.locationID}">--:--</span></div>` : ''}
                            ${!showCompleted ? `<button class="end-early-btn" onclick="endBooking('${b.id}', '${b.locationID}')">End Session Early</button>` : `<div class="detail-item"><span class="detail-label">Ended At</span><span class="detail-value">${b.completedAt || 'N/A'}</span></div>`}
                        </div>`;
                });
                container.innerHTML = html;
                if (!showCompleted) startCountdownEngine();
            });
        }

        function startCountdownEngine() {
            if (globalTimerInterval) clearInterval(globalTimerInterval);
            globalTimerInterval = setInterval(() => {
                document.querySelectorAll('.timer-display').forEach(async (el) => {
                    const expiry = parseInt(el.dataset.expiry);
                    const diff = expiry - Date.now();
                    
                    if (diff <= 0) {
                        const bID = el.dataset.id;
                        const lID = el.dataset.loc;
                        // Trigger silent auto-complete
                        autoEndBooking(bID, lID);
                    } else {
                        const mins = Math.floor(diff / 1000 / 60);
                        const secs = Math.floor((diff / 1000) % 60);
                        el.textContent = `${mins}m ${secs}s`;
                    }
                });
            }, 1000);
        }

        async function autoEndBooking(id, locId) {
            try {
                const batch = db.batch();
                batch.update(db.collection("bookings").doc(id), { status: 'COMPLETED', completedAt: new Date().toLocaleString('en-IN') });
                batch.update(db.collection("parking_spots").doc(locId), { occupied: firebase.firestore.FieldValue.increment(-1) });
                await batch.commit();
            } catch (e) { console.error(e); }
        }

        async function endBooking(id, locId) {
            if (confirm('End parking early?')) {
                autoEndBooking(id, locId);
            }
        }

        function handleLogout() { if(confirm("Logout?")) auth.signOut().then(() => window.location.href = "user-login.html"); }
        function toggleBookingsView() { 
            showCompleted = !showCompleted; 
            document.getElementById('bookingsTitle').innerText = showCompleted ? "My Booking History" : "My Active Bookings";
            document.getElementById('viewToggle').innerHTML = showCompleted ? '<i class="fas fa-clock"></i> View Active' : '<i class="fas fa-history"></i> View Completed';
            listenToMyBookings(); 
        }
        function bookSpot(e, key, name, price) { window.location.href = `booking.html?location=${key}&name=${encodeURIComponent(name)}&price=${price}`; }
        function openMumbaiSpots() { currentParkingView = 'spots'; initRealTimeSync(); }
        function resetNearestView() { currentParkingView = 'cities'; initRealTimeSync(); }
        function updateLastUpdated() { document.getElementById('userLastUpdated').textContent = `Sync: ${new Date().toLocaleTimeString('en-IN')}`; }
        function scrollToBookings() { document.querySelector('.bookings-section').scrollIntoView({behavior: 'smooth'}); }
        function filterCities() {
            const term = document.getElementById('citySearch').value.toLowerCase();
            document.querySelectorAll('.city-card-dashboard').forEach(card => {
                card.style.display = card.querySelector('.city-name-lg').textContent.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        }
        function handleSearchKey(e) { if(e.key === 'Enter') filterCities(); }
    </script>
</body>
</html>
