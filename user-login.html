<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartPark India</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: #f0f6fc; padding: 20px;
        }
        .login-container { 
            background: rgba(255,255,255,0.06); backdrop-filter: blur(25px); 
            border-radius: 28px; padding: 50px; border: 1px solid rgba(46,164,255,0.2);
            max-width: 450px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .login-header h2 { 
            text-align: center; margin-bottom: 10px;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-header p { text-align: center; color: #8b949e; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(46,164,255,0.2);
            background: rgba(255,255,255,0.08); color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #58a6ff; }
        .login-btn { 
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #58a6ff, #79c0ff); color: #0d1117;
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(88,166,255,0.3); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .signup-link { text-align: center; margin-top: 20px; color: #8b949e; display: block; text-decoration: none; }
        .signup-link:hover { color: #58a6ff; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>Driver Login</h2>
            <p>Access your parking bookings</p>
        </div>
        
        <form id="userLoginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="yash@example.com" required>
            </div>
            <div class="form-group">
                <label>4-Digit PIN</label>
                <input type="password" id="userPin" placeholder="Ex: 1234" maxlength="4" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>
        
        <a href="user-signup.html" class="signup-link">New user? Create Account</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDigmGHwWyihxCZJP7KU5CijptuqwAtZqs",
            authDomain: "smartpark-india-54312.firebaseapp.com",
            projectId: "smartpark-india-54312",
            storageBucket: "smartpark-india-54312.firebasestorage.app",
            messagingSenderId: "58298050108",
            appId: "1:58298050108:web:2775b30f48c8ce7dad0539"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. Login Logic
        document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('userEmail').value.trim();
            const pin = document.getElementById('userPin').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Verifying...";
            btn.disabled = true;

            try {
                // THE SECRET HANDSHAKE: Add "00" to match the Signup code
                const securePass = pin + "00";

                // Connect to Firebase Auth
                await auth.signInWithEmailAndPassword(email, securePass);
                
                // Success!
                window.location.href = "user-dashboard.html";

            } catch (error) {
                console.error("Login Error:", error.code);
                
                // Reset UI for user
                btn.innerText = "Login";
                btn.disabled = false;

                if (error.code === 'auth/wrong-password') {
                    alert("❌ Incorrect PIN. Please try again.");
                } else if (error.code === 'auth/user-not-found') {
                    alert("❌ No account found with this email.");
                } else {
                    alert("❌ Error: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
